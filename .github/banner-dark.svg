<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ADD8" />
      <stop offset="50%" style="stop-color:#a855f7" />
      <stop offset="100%" style="stop-color:#f97316" />
    </linearGradient>
    <linearGradient id="icon-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8" />
      <stop offset="100%" style="stop-color:#a855f7" />
    </linearGradient>
  </defs>

  <rect width="700" height="180" rx="12" fill="url(#bg)" />
  <rect x="0" y="0" width="700" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Radar / recon icon -->
  <g transform="translate(60, 35)">
    <!-- Outer ring -->
    <circle cx="45" cy="45" r="42" fill="none" stroke="url(#icon-fill)" stroke-width="1.5" opacity="0.2"/>
    <!-- Middle ring -->
    <circle cx="45" cy="45" r="28" fill="none" stroke="url(#icon-fill)" stroke-width="1.5" opacity="0.35"/>
    <!-- Inner ring -->
    <circle cx="45" cy="45" r="14" fill="none" stroke="url(#icon-fill)" stroke-width="1.5" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="45" cy="45" r="3.5" fill="url(#icon-fill)" opacity="0.9"/>
    <!-- Sweep line -->
    <line x1="45" y1="45" x2="45" y2="3" stroke="url(#icon-fill)" stroke-width="2" opacity="0.7"/>
    <!-- Sweep cone (triangular glow) -->
    <path d="M45 45 L35 5 L45 3 Z" fill="url(#icon-fill)" opacity="0.08"/>
    <path d="M45 45 L55 5 L45 3 Z" fill="url(#icon-fill)" opacity="0.05"/>
    <!-- Detected blips -->
    <circle cx="62" cy="25" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="30" cy="58" r="2.5" fill="#f97316" opacity="0.7"/>
    <circle cx="70" cy="55" r="2" fill="#ef4444" opacity="0.7"/>
    <circle cx="25" cy="32" r="2" fill="#22c55e" opacity="0.6"/>
    <!-- Crosshair lines -->
    <line x1="3" y1="45" x2="87" y2="45" stroke="url(#icon-fill)" stroke-width="0.7" opacity="0.15"/>
    <line x1="45" y1="3" x2="45" y2="87" stroke="url(#icon-fill)" stroke-width="0.7" opacity="0.15"/>
  </g>

  <text x="170" y="68" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    recon0
  </text>

  <text x="170" y="98" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.2">
    All-in-one bug bounty reconnaissance pipeline
  </text>

  <g transform="translate(170, 118)">
    <rect x="0" y="0" width="82" height="26" rx="13" fill="#00ADD8" opacity="0.12" stroke="#00ADD8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="41" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#00ADD8" text-anchor="middle" font-weight="600">9 stages</text>

    <rect x="94" y="0" width="100" height="26" rx="13" fill="#a855f7" opacity="0.12" stroke="#a855f7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="144" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="600">13 providers</text>

    <rect x="206" y="0" width="96" height="26" rx="13" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
    <text x="254" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#f97316" text-anchor="middle" font-weight="600">60+ DSL rules</text>

    <rect x="314" y="0" width="58" height="26" rx="13" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="343" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Go</text>
  </g>
</svg>
